

# Site Settings
name: J. Shepard Bryan IV
title: Shep's Spot
description: A website to showcase the work done by Shep Bryan IV.
tags:
  - blog
  - template
  - jekyll
  - theme
  - netlify
show_hero: true
menu:
  - title: Home
    url: /
  - title: About
    url: /pages/about
  - title: Contact
    url: /pages/contact
  - title: Feed
    url: /feed.xml
  - title: Projects
    url: /projects
  - title: Store
    url: /pages/store
  - title: Tutorials
    url: /tutorials
email: shepperoni.pizza@gmail.com

# Disqus Setting (https://disqus.com/)
disqus_username: jsbryaniv

# Contact Form Setting (https://formspree.io/)
formspree_form_id: xdorvdlp

# Social Media Settings
github_username: jsbryaniv
# facebook_username: facebook_username
twitter_username: shep_iv
# instagram_username: instagram_username
linkedin_username: shep-bryan-iv
# medium_username: medium_username

# Posts Settings
show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true

# Advanced Settings
baseurl: "" # the subpath of your site, e.g. /blog
url: "https://jsbryaniv.com/"
google_analytics: "G-5QC1QFQJSK"
language: "en"
categories_folder: category
sent_message_url: "/contact/message-sent/"

# Build settings
destination: .dev/build/_site
disable_disk_cache: true
incremental: false
markdown: kramdown
highlighter: rouge
permalink: /:title/
collections:
  authors:
    output: true
paginate_path: "/page/:num/"
use_logo: false

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# Jekyll directories
layouts_dir: jekyll/_layouts
includes_dir: jekyll/_includes
plugins_dir: jekyll/_plugins
sass:
  sass_dir: jekyll/_sass
  style: compressed

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Exclude local-only files
exclude:
  - _quarto.yml
  - README.md
  - TODO.md
  - Gemfile
  - Gemfile.lock
  - .dev

# Theme
version: v3.1.2
