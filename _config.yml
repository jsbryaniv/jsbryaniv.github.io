# --- Newsletter Settings ---

# Newsletter / Buttondown settings
buttondown:
  username: "shep4"
  newsletter_url: "https://buttondown.com/"
  archive_url: "/newsletter/archive/"
  success_url: "/newsletter/confirmation/"


# --- Content & Display ---

# Collections
collections:
  authors:
    output: true
  projects:
    output: true
  shop:
    output: true
  tutorials:
    output: true

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# Site Settings
show_hero: true
categories_folder: category
sent_message_url: "/contact/message-sent/"

# Menu
menu:
  - title: Home
    url: /
  - title: About
    url: /about
  - title: Blog
    url: /blog
  - title: Contact
    url: /contact
  - title: Privacy
    url: /privacy
  - title: Projects
    url: /projects
  - title: Shop
    url: /shop
  - title: Terms
    url: /terms
  - title: Tutorials
    url: /tutorials

# Posts Settings
show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true

# --- Build Settings ---

# Build settings
destination: .dev/build/_site
disable_disk_cache: true
incremental: false
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate_path: "/page/:num/"
use_logo: false

# Default behaviors
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: /blog/:year/:month/:slug/
      paginate: false
      math: true
      comments: true
  - scope:
      path: ""
      type: "tutorials"
    values:
      layout: tutorial
      permalink: /tutorials/:path/
  - scope:
      path: ""
      type: "shop"
    values:
      layout: shop_product
      permalink: /shop/:slug/

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Includes
layouts_dir: jekyll/_layouts
includes_dir: jekyll/_includes
plugins_dir: jekyll/_plugins
sass:
  sass_dir: jekyll/_sass
  style: compressed
  cache_location: .dev/build/.sass-cache

# Excludes
exclude:
  # Standard ignores
  - .dev
  - README.md
  - Gemfile
  - Gemfile.lock
  - .bundle
  - .jekyll-cache
  - .sass-cache
  - vendor
  - vendor/bundle
  - node_modules
  # Post assets are copied via plugin, ignore originals
  - _posts/**/assets/**
  # Ignore tutorial material, aside from what gets displayed
  - _tutorials/**/*.qmd          # Quarto source files
  - _tutorials/_quarto.yml       # Quarto config
  - _tutorials/.quarto/          # Quarto cache
  - _tutorials/.quartoignore     # Quarto ignore file
  - _tutorials/.venv/            # Python virtual environment
  - _tutorials/requirements.txt  # Python dependencies
  - _tutorials/**/social/        # Social media extras
