# --- Content & Display ---

# Collections
collections:
  authors:
    output: true
  projects:
    output: true
  store:
    output: true
  tutorials:
    output: true

# Content paginator
paginate_content:
  enabled: true
  debug: false
  collections:
    - posts
  auto: false
  separator: "--page-break--"
  permalink: "/:num/"
  seo_canonical: true
  properties:
    part:
      is_generated: true
    last:
      is_generated: true
    single:
      is_generated: true

# Site Settings
show_hero: true
categories_folder: category
sent_message_url: "/contact/message-sent/"

# Menu
menu:
  - title: Home
    url: /
  - title: About
    url: /about
  - title: Blog
    url: /blog
  - title: Contact
    url: /contact
  - title: Projects
    url: /projects
  - title: Store
    url: /store
  - title: Tutorials
    url: /tutorials

# Posts Settings
show_time_bar: true
show_modal_on_exit: false
show_modal_on_finish_post: true
two_columns_layout: true

# --- Build Settings ---

# Build settings
destination: .dev/build/_site
disable_disk_cache: true
incremental: false
markdown: kramdown
highlighter: rouge
permalink: /:title/
paginate_path: "/page/:num/"
use_logo: false

# Default behaviors
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      permalink: /blog/:year/:month/:title/
      paginate: false
      math: true
      comments: true

# Plugins
plugins:
  - jekyll-paginate
  - jekyll-paginate-content

# Includes
layouts_dir: jekyll/_layouts
includes_dir: jekyll/_includes
plugins_dir: jekyll/_plugins
sass:
  sass_dir: jekyll/_sass
  style: compressed
  cache_location: .dev/build/.sass-cache

# Excludes
exclude:
  - _posts/**/assets/**  # Post assets are copied via plugin, ignore originals
  - _quarto.yml
  - README.md
  - Gemfile
  - Gemfile.lock
  - .dev
