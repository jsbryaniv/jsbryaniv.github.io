---
layout: default
---

<style>
  .post.tutorial-page {
    top: 0 !important;
  }
  
  .tutorial-nav {
    padding: 80px 0 5px 23px;
  }
  
  .back-to-tutorials {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    color: #999;
    text-decoration: none;
    font-size: 18px;
    font-weight: 400;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    transition: all 0.3s ease;
  }
  
  .back-to-tutorials::before {
    content: "←";
    font-size: 24px;
    transition: transform 0.3s ease;
  }
  
  .back-to-tutorials:hover {
    color: #ff0a16;
  }
  
  .back-to-tutorials:hover::before {
    transform: translateX(-4px);
  }
  
  .post.tutorial-page .post-content.fullwidth {
    padding-top: 10px;
  }

  .tutorial-embed {
    margin: 20px 0;
  }

  .tutorial-embed iframe {
    width: 100%;
    border: none;
    min-height: 600px;
  }

  .youtube-embed {
    margin: 30px 0;
    position: relative;
    padding-bottom: 56.25%; /* 16:9 aspect ratio */
    height: 0;
    overflow: hidden;
  }

  .youtube-embed iframe {
    position: absolute;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    border: none;
  }
  
  @media (min-width: 37.5rem) {
    .tutorial-nav {
      padding-top: 90px;
    }
    
    .back-to-tutorials {
      font-size: 20px;
    }
    
    .back-to-tutorials::before {
      font-size: 28px;
    }
  }
</style>

<div class="post tutorial-page">
  <nav class="tutorial-nav">
    <a href="/tutorials/" class="back-to-tutorials">Back to Tutorials</a>
  </nav>
  
  <article class="post-content fullwidth">
    {% if page.youtube_url %}
      <div class="youtube-embed">
        {% assign youtube_id = page.youtube_url | split: "v=" | last | split: "&" | first %}
        <iframe 
          src="https://www.youtube.com/embed/{{ youtube_id }}" 
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture" 
          allowfullscreen>
        </iframe>
      </div>
    {% endif %}

    <div class="tutorial-embed">
      <iframe src="../tutorial.html"></iframe>
    </div>
  </article>
</div>
