<ul class="footer-links" style="display:flex;flex-direction:row;flex-wrap:wrap;justify-content:center;gap:.5rem 1rem;padding:0;margin:0;list-style:none;">
  {% for item in site.menu %}
    {% if item.title and item.url %}
      <li style="margin:0;display:inline-flex;">
        <a href="{{ item.url | absolute_url }}">{{ item.title }}</a>
      </li>
    {% endif %}
  {% endfor %}
</ul>
